services:
  broker:
    # Publish this image from the reviewed OneBrain source revision. Pin by digest.
    image: ${ONEBRAIN_BROKER_IMAGE:?set an immutable broker image digest}
    command:
      - python
      - -m
      - uvicorn
      - app.provisioning.hetzner.broker_service:create_broker_app
      - --factory
      - --host
      - 0.0.0.0
      - --port
      - "8000"
    env_file:
      - broker.env
    # The process is reachable only from the local host Caddy instance.
    ports:
      - "127.0.0.1:8181:8000"
    read_only: true
    tmpfs:
      - /tmp:mode=1777,size=64m
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true
    restart: unless-stopped
