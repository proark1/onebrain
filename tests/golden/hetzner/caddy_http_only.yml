:80 {
    encode gzip
    header -Server
    handle /api/fleet {
        respond "Not Found" 404
    }
    handle /api/fleet/* {
        respond "Not Found" 404
    }
    handle /api/operator {
        respond "Not Found" 404
    }
    handle /api/operator/* {
        respond "Not Found" 404
    }
    handle /api/provisioning {
        respond "Not Found" 404
    }
    handle /api/provisioning/* {
        respond "Not Found" 404
    }
    handle /api/rollouts {
        respond "Not Found" 404
    }
    handle /api/rollouts/* {
        respond "Not Found" 404
    }
    handle /api/onebrain/* {
        reverse_proxy onebrain-admin-ui:3000
    }
    handle /api/* {
        reverse_proxy onebrain-api:8000
    }
    handle /health* {
        reverse_proxy onebrain-api:8000
    }
    handle {
        reverse_proxy onebrain-admin-ui:3000
    }
}
