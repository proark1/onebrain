:80 {
    encode gzip
    header -Server
    handle /api/fleet {
        respond "Not Found" 404
    }
    handle /api/fleet/* {
        respond "Not Found" 404
    }
    handle /api/operator {
        respond "Not Found" 404
    }
    handle /api/operator/* {
        respond "Not Found" 404
    }
    handle /api/provisioning {
        respond "Not Found" 404
    }
    handle /api/provisioning/* {
        respond "Not Found" 404
    }
    handle /api/rollouts {
        respond "Not Found" 404
    }
    handle /api/rollouts/* {
        respond "Not Found" 404
    }
    handle /api/onebrain/* {
        uri replace /api/onebrain /api
        reverse_proxy {
            dynamic a api-edge 8000 {
                refresh 5s
            }
            header_up X-Forwarded-For {remote_host}
        }
    }
    handle /api/* {
        reverse_proxy {
            dynamic a api-edge 8000 {
                refresh 5s
            }
            header_up X-Forwarded-For {remote_host}
        }
    }
    handle /health* {
        reverse_proxy {
            dynamic a api-edge 8000 {
                refresh 5s
            }
            header_up X-Forwarded-For {remote_host}
        }
    }
    handle {
        reverse_proxy onebrain-admin-ui:3000
    }
}
