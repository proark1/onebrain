name: Provision Customer

on:
  workflow_dispatch:
    inputs:
      run_id:
        required: true
        type: string
      account_id:
        required: true
        type: string
      deployment_id:
        required: true
        type: string
      customer_name:
        required: true
        type: string
      module_ids_json:
        required: true
        type: string
      deployment_type:
        required: true
        type: string
      region:
        required: false
        type: string
        default: eu-central
      release_ring:
        required: false
        type: string
        default: manual
      initial_version:
        required: true
        type: string
      module_versions_json:
        required: false
        type: string
        default: "{}"
      brand_theme_json:
        required: false
        type: string
        default: "{}"
      callback_url:
        required: true
        type: string
      callback_key_id:
        required: false
        type: string
        default: ""
      dry_run:
        required: false
        type: choice
        options: ["true", "false"]
        default: "true"

jobs:
  provision:
    name: Provision customer stack
    runs-on: ubuntu-latest
    timeout-minutes: 45

    env:
      IN_RUN_ID: ${{ inputs.run_id }}
      IN_ACCOUNT_ID: ${{ inputs.account_id }}
      IN_DEPLOYMENT_ID: ${{ inputs.deployment_id }}
      IN_CUSTOMER_NAME: ${{ inputs.customer_name }}
      IN_MODULE_IDS_JSON: ${{ inputs.module_ids_json }}
      IN_DEPLOYMENT_TYPE: ${{ inputs.deployment_type }}
      IN_REGION: ${{ inputs.region }}
      IN_RELEASE_RING: ${{ inputs.release_ring }}
      IN_INITIAL_VERSION: ${{ inputs.initial_version }}
      IN_MODULE_VERSIONS_JSON: ${{ inputs.module_versions_json }}
      IN_BRAND_THEME_JSON: ${{ inputs.brand_theme_json }}
      IN_CALLBACK_URL: ${{ inputs.callback_url }}
      IN_CALLBACK_KEY_ID: ${{ inputs.callback_key_id }}
      IN_DRY_RUN: ${{ inputs.dry_run }}

    steps:
      - name: Check out repository
        uses: actions/checkout@v5

      - name: Validate inputs
        shell: bash
        run: |
          set -euo pipefail
          test -n "${IN_RUN_ID}"
          test -n "${IN_ACCOUNT_ID}"
          test -n "${IN_DEPLOYMENT_ID}"
          test -n "${IN_CALLBACK_URL}"
          python - <<'PY'
          import json
          import os

          module_ids = json.loads(os.environ["IN_MODULE_IDS_JSON"])
          allowed = {"assistant", "kpi_dashboard", "ai_employees", "communication"}
          if not isinstance(module_ids, list) or any(not isinstance(item, str) for item in module_ids):
              raise SystemExit("module_ids_json must be an array of strings")
          if len(set(module_ids)) != len(module_ids):
              raise SystemExit("module_ids_json must not contain duplicates")
          unknown = sorted(set(module_ids) - allowed)
          if unknown:
              raise SystemExit(f"unknown optional modules: {unknown}")
          PY
          python -m json.tool <<< "${IN_MODULE_VERSIONS_JSON}" >/dev/null
          python -m json.tool <<< "${IN_BRAND_THEME_JSON}" >/dev/null

      - name: Mask secrets
        shell: bash
        run: |
          set -euo pipefail
          if [ -n "${{ secrets.ONEBRAIN_PROVISIONING_CALLBACK_KEY }}" ]; then
            echo "::add-mask::${{ secrets.ONEBRAIN_PROVISIONING_CALLBACK_KEY }}"
          fi
          if [ -n "${{ secrets.RAILWAY_TOKEN }}" ]; then
            echo "::add-mask::${{ secrets.RAILWAY_TOKEN }}"
          fi

      - name: Send running callback
        shell: bash
        env:
          CALLBACK_KEY: ${{ secrets.ONEBRAIN_PROVISIONING_CALLBACK_KEY }}
        run: |
          set -euo pipefail
          curl --fail-with-body -sS -X POST "${IN_CALLBACK_URL}" \
            -H "Authorization: Bearer ${CALLBACK_KEY}" \
            -H "X-OneBrain-Callback-Key-Id: ${IN_CALLBACK_KEY_ID}" \
            -H "Content-Type: application/json" \
            --data '{"status":"running","external_run_id":"${{ github.run_id }}","external_run_url":"${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"}'

      - name: Dry-run provisioning
        if: ${{ inputs.dry_run == 'true' }}
        shell: bash
        env:
          CALLBACK_KEY: ${{ secrets.ONEBRAIN_PROVISIONING_CALLBACK_KEY }}
        run: |
          set -euo pipefail
          export API_URL="https://${IN_ACCOUNT_ID}-api.example.invalid"
          export UI_URL="https://${IN_ACCOUNT_ID}-admin.example.invalid"
          export WORKER_URL="worker://${IN_ACCOUNT_ID}"
          export BOOTSTRAP_PASSWORD="$(python - <<'PY'
          import secrets
          print(secrets.token_urlsafe(24))
          PY
          )"
          echo "::add-mask::${BOOTSTRAP_PASSWORD}"
          # Quoted heredoc: nothing is shell-interpolated into Python source. Every
          # untrusted value is read from os.environ, so no input can break the literal.
          payload=$(python - <<'PY'
          import json, os
          run_id = os.environ["GITHUB_RUN_ID"]
          url = f'{os.environ["GITHUB_SERVER_URL"]}/{os.environ["GITHUB_REPOSITORY"]}/actions/runs/{run_id}'
          dep = os.environ["IN_DEPLOYMENT_ID"]
          print(json.dumps({
              "status": "succeeded",
              "external_run_id": run_id,
              "external_run_url": url,
              "railway_project_id": f"dry_{dep}",
              "railway_environment_id": f"dry_env_{dep}",
              "service_urls": {"api": os.environ["API_URL"], "admin_ui": os.environ["UI_URL"], "worker": os.environ["WORKER_URL"]},
              "migration_revision": "dry-run",
              "smoke_status": "dry_run_passed",
              "result_payload": {
                  "module_ids": json.loads(os.environ["IN_MODULE_IDS_JSON"]),
                  "deployment_type": os.environ["IN_DEPLOYMENT_TYPE"],
                  "module_versions": json.loads(os.environ["IN_MODULE_VERSIONS_JSON"]),
              },
              "bootstrap_password": os.environ["BOOTSTRAP_PASSWORD"],
          }))
          PY
          )
          curl --fail-with-body -sS -X POST "${IN_CALLBACK_URL}" \
            -H "Authorization: Bearer ${CALLBACK_KEY}" \
            -H "X-OneBrain-Callback-Key-Id: ${IN_CALLBACK_KEY_ID}" \
            -H "Content-Type: application/json" \
            --data "${payload}"

      - name: Install Railway CLI
        if: ${{ inputs.dry_run == 'false' }}
        shell: bash
        run: |
          set -euo pipefail
          npm install -g @railway/cli

      - name: Provision Railway stack
        if: ${{ inputs.dry_run == 'false' }}
        shell: bash
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
          RAILWAY_API_TOKEN: ${{ secrets.RAILWAY_API_TOKEN }}
          RAILWAY_WORKSPACE: ${{ secrets.RAILWAY_WORKSPACE }}
          CALLBACK_KEY: ${{ secrets.ONEBRAIN_PROVISIONING_CALLBACK_KEY }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          ONEBRAIN_MIGRATION_EMBEDDING_DIM: ${{ secrets.ONEBRAIN_MIGRATION_EMBEDDING_DIM }}
          ASSISTANT_SERVICE_IMAGE: ${{ secrets.ASSISTANT_SERVICE_IMAGE }}
          COMMUNICATION_API_IMAGE: ${{ secrets.COMMUNICATION_API_IMAGE }}
          COMMUNICATION_WIDGET_IMAGE: ${{ secrets.COMMUNICATION_WIDGET_IMAGE }}
          COMMUNICATION_VOICE_IMAGE: ${{ secrets.COMMUNICATION_VOICE_IMAGE }}
          COMMUNICATION_WORKERS_IMAGE: ${{ secrets.COMMUNICATION_WORKERS_IMAGE }}
        run: |
          set -euo pipefail
          TOKEN="${RAILWAY_API_TOKEN:-${RAILWAY_TOKEN:-}}"
          if [ -z "${TOKEN}" ]; then
            echo "RAILWAY_API_TOKEN or RAILWAY_TOKEN is required for real provisioning" >&2
            exit 1
          fi
          export RAILWAY_TOKEN="${TOKEN}"
          PROJECT_NAME="onebrain-${IN_ACCOUNT_ID}-${IN_DEPLOYMENT_ID}"
          TEMPLATE_DOLLAR='$'
          BOOTSTRAP_PASSWORD="$(python - <<'PY'
          import secrets
          print(secrets.token_urlsafe(32))
          PY
          )"
          AUTH_SECRET="$(python - <<'PY'
          import secrets
          print(secrets.token_hex(32))
          PY
          )"
          echo "::add-mask::${BOOTSTRAP_PASSWORD}"
          echo "::add-mask::${AUTH_SECRET}"
          if [ -n "${GEMINI_API_KEY}" ]; then
            echo "::add-mask::${GEMINI_API_KEY}"
          fi

          mkdir -p .provisioning

          run_railway() {
            railway "$@"
          }

          add_service() {
            local service="$1"
            run_railway service list --json > .provisioning/services_current.json || echo "[]" > .provisioning/services_current.json
            if ! python - "$service" .provisioning/services_current.json <<'PY'
          import json, sys
          wanted = sys.argv[1]
          path = sys.argv[2]
          try:
              data = json.load(open(path, encoding="utf-8"))
          except Exception:
              data = []
          services = data.get("services", data) if isinstance(data, dict) else data
          for service in services or []:
              if isinstance(service, dict) and service.get("name") == wanted:
                  raise SystemExit(0)
          raise SystemExit(1)
          PY
            then
              run_railway add --service "${service}" --json >/dev/null
            fi
          }

          set_vars() {
            local service="$1"
            shift
            if [ "$#" -gt 0 ]; then
              run_railway variable set --service "${service}" --skip-deploys "$@" >/dev/null
            fi
          }

          parse_domain() {
            python - "$1" <<'PY'
          import json, sys
          path = sys.argv[1]
          try:
              data = json.load(open(path, encoding="utf-8"))
          except Exception:
              raise SystemExit(1)
          found = []
          def walk(value):
              if isinstance(value, str):
                  if value.startswith("http://") or value.startswith("https://") or value.endswith(".up.railway.app"):
                      found.append(value)
              elif isinstance(value, dict):
                  for item in value.values():
                      walk(item)
              elif isinstance(value, list):
                  for item in value:
                      walk(item)
          walk(data)
          if not found:
              raise SystemExit(1)
          value = found[0].rstrip("/")
          if value.startswith("http://") or value.startswith("https://"):
              print(value)
          else:
              print(f"https://{value}")
          PY
          }

          service_ids_json() {
            python - <<'PY'
          import json
          from pathlib import Path
          try:
              data = json.loads(Path(".provisioning/services.json").read_text())
          except Exception:
              print("{}")
              raise SystemExit(0)
          services = data.get("services", data) if isinstance(data, dict) else data
          result = {}
          for service in services or []:
              if not isinstance(service, dict):
                  continue
              name = service.get("name") or service.get("serviceName")
              service_id = service.get("id") or service.get("serviceId")
              if name and service_id:
                  result[name] = service_id
          print(json.dumps(result, sort_keys=True))
          PY
          }

          module_image() {
            case "$1" in
              assistant-service) echo "${ASSISTANT_SERVICE_IMAGE:-}" ;;
              communication-api) echo "${COMMUNICATION_API_IMAGE:-}" ;;
              communication-widget) echo "${COMMUNICATION_WIDGET_IMAGE:-}" ;;
              communication-voice) echo "${COMMUNICATION_VOICE_IMAGE:-}" ;;
              communication-workers) echo "${COMMUNICATION_WORKERS_IMAGE:-}" ;;
              *) echo "" ;;
            esac
          }

          mapfile -t selected_modules < <(python - <<'PY'
          import json, os

          for module_id in json.loads(os.environ["IN_MODULE_IDS_JSON"]):
              print(module_id)
          PY
          )
          module_services=()
          for selected_module in "${selected_modules[@]}"; do
            case "${selected_module}" in
              assistant)
                module_services+=(assistant-service)
                ;;
              communication)
                module_services+=(communication-api communication-widget communication-voice communication-workers)
                ;;
              kpi_dashboard|ai_employees)
                # These product modules run within Core services today.
                ;;
              *)
                echo "Unknown optional module: ${selected_module}" >&2
                exit 1
                ;;
            esac
          done

          if [ -n "${RAILWAY_API_TOKEN:-}" ]; then
            export RAILWAY_API_TOKEN="${RAILWAY_API_TOKEN}"
          fi
          if [ -n "${RAILWAY_WORKSPACE:-}" ]; then
            run_railway init --name "${PROJECT_NAME}" --workspace "${RAILWAY_WORKSPACE}" --json | tee .provisioning/project.json >/dev/null
          else
            run_railway init --name "${PROJECT_NAME}" --json | tee .provisioning/project.json >/dev/null
          fi

          run_railway add --database postgres --json | tee .provisioning/postgres.json >/dev/null
          add_service onebrain-api
          add_service onebrain-workers
          add_service onebrain-admin-ui

          module_services_pending=()
          module_services_deployed=()
          for module in "${module_services[@]}"; do
            image="$(module_image "${module}")"
            if [ -n "${image}" ]; then
              run_railway add --service "${module}" --image "${image}" --json >/dev/null
              module_services_deployed+=("${module}")
            else
              add_service "${module}"
              module_services_pending+=("${module}")
            fi
          done

          run_railway service list --json | tee .provisioning/services.json >/dev/null

          run_railway domain --service onebrain-api --port 8080 --json | tee .provisioning/api_domain.json >/dev/null
          run_railway domain --service onebrain-admin-ui --port 3000 --json | tee .provisioning/admin_ui_domain.json >/dev/null
          API_URL="$(parse_domain .provisioning/api_domain.json)"
          ADMIN_UI_URL="$(parse_domain .provisioning/admin_ui_domain.json)"
          # Export so the smoke-check python subprocess (below) sees them via
          # os.environ; the $GITHUB_ENV writes only reach subsequent steps.
          export API_URL ADMIN_UI_URL
          echo "API_URL=${API_URL}" >> "$GITHUB_ENV"
          echo "ADMIN_UI_URL=${ADMIN_UI_URL}" >> "$GITHUB_ENV"

          DATABASE_REF="${TEMPLATE_DOLLAR}{{Postgres.DATABASE_URL}}"
          API_PRIVATE_BASE="http://${TEMPLATE_DOLLAR}{{onebrain-api.RAILWAY_PRIVATE_DOMAIN}}:8080"
          EMBEDDING_DIM="${ONEBRAIN_MIGRATION_EMBEDDING_DIM:-256}"
          if [ -n "${GEMINI_API_KEY}" ]; then
            EMBEDDING_DIM="${ONEBRAIN_MIGRATION_EMBEDDING_DIM:-3072}"
          fi

          common_vars=(
            "ONEBRAIN_AUTH_SECRET=${AUTH_SECRET}"
            "ONEBRAIN_ADMIN_EMAIL=admin@${IN_ACCOUNT_ID}.onebrain.local"
            "ONEBRAIN_ADMIN_PASSWORD=${BOOTSTRAP_PASSWORD}"
            "ONEBRAIN_VECTOR_STORE=pgvector"
            "ONEBRAIN_DATABASE_URL=${DATABASE_REF}"
            "ONEBRAIN_MIGRATION_EMBEDDING_DIM=${EMBEDDING_DIM}"
            "ONEBRAIN_COOKIE_SECURE=true"
            "ONEBRAIN_PII_PHASE=synthetic"
            "ONEBRAIN_REQUIRE_APPROVAL=false"
            "ONEBRAIN_BLOCK_PUBLIC_ON_PII=true"
            "ONEBRAIN_RETRIEVAL_MIN_SCORE=0.05"
            "ONEBRAIN_SEED_DEMO_USERS=false"
            "ONEBRAIN_ALLOW_DEMO_USERS=false"
          )
          if [ -n "${GEMINI_API_KEY}" ]; then
            common_vars+=(
              "GEMINI_API_KEY=${GEMINI_API_KEY}"
              "ONEBRAIN_LLM_PROVIDER=litellm"
              "ONEBRAIN_EMBEDDINGS_PROVIDER=litellm"
            )
          fi

          set_vars onebrain-api "${common_vars[@]}" \
            "ONEBRAIN_ADMIN_UI_URL=${ADMIN_UI_URL}" \
            "ONEBRAIN_LEGACY_STATIC_UI_ENABLED=false"
          set_vars onebrain-workers "${common_vars[@]}"
          set_vars onebrain-admin-ui \
            "ONEBRAIN_API_BASE_URL=${API_PRIVATE_BASE}" \
            "NODE_ENV=production"

          for module in "${module_services[@]}"; do
            set_vars "${module}" \
              "ONEBRAIN_API_BASE_URL=${API_PRIVATE_BASE}" \
              "ONEBRAIN_ACCOUNT_ID=${IN_ACCOUNT_ID}" \
              "ONEBRAIN_DEPLOYMENT_ID=${IN_DEPLOYMENT_ID}" \
              "ONEBRAIN_MODULE_ID=${module}"
          done

          run_railway up --service onebrain-api --detach

          WORKER_CONTEXT="$(mktemp -d)"
          cp requirements.txt "${WORKER_CONTEXT}/requirements.txt"
          cp Dockerfile.worker "${WORKER_CONTEXT}/Dockerfile"
          cp alembic.ini "${WORKER_CONTEXT}/alembic.ini"
          cp -R app "${WORKER_CONTEXT}/app"
          cp -R migrations "${WORKER_CONTEXT}/migrations"
          run_railway up "${WORKER_CONTEXT}" --path-as-root --service onebrain-workers --detach

          run_railway up onebrain-web --path-as-root --service onebrain-admin-ui --detach

          for module in "${module_services_deployed[@]}"; do
            run_railway redeploy --service "${module}" --yes >/dev/null || true
          done

          python - <<'PY'
          import os
          import sys
          import time
          import urllib.error
          import urllib.request

          checks = [
              ("api", os.environ["API_URL"].rstrip("/") + "/health"),
              ("admin_ui", os.environ["ADMIN_UI_URL"].rstrip("/") + "/"),
          ]
          deadline = time.time() + 300
          pending = dict(checks)
          last_error = {}
          while pending and time.time() < deadline:
              for name, url in list(pending.items()):
                  try:
                      with urllib.request.urlopen(url, timeout=10) as response:
                          if 200 <= response.status < 500:
                              pending.pop(name)
                  except Exception as exc:
                      last_error[name] = str(exc)
              if pending:
                  time.sleep(10)
          if pending:
              print(f"Smoke checks failed: {last_error}", file=sys.stderr)
              raise SystemExit(1)
          PY

          SERVICE_IDS_JSON="$(service_ids_json)"
          printf '%s\n' "${module_services_pending[@]}" | python - <<'PY' > .provisioning/module_pending.json
          import json, sys
          print(json.dumps([line.strip() for line in sys.stdin if line.strip()]))
          PY
          MODULE_PENDING_JSON="$(cat .provisioning/module_pending.json)"
          printf '%s\n' "${module_services_deployed[@]}" | python - <<'PY' > .provisioning/module_deployed.json
          import json, sys
          print(json.dumps([line.strip() for line in sys.stdin if line.strip()]))
          PY
          MODULE_DEPLOYED_JSON="$(cat .provisioning/module_deployed.json)"

          export PROJECT_NAME API_URL ADMIN_UI_URL BOOTSTRAP_PASSWORD SERVICE_IDS_JSON MODULE_DEPLOYED_JSON MODULE_PENDING_JSON
          # Quoted heredoc: no shell interpolation into Python source; all values via os.environ.
          payload=$(python - <<'PY'
          import json, os
          run_id = os.environ["GITHUB_RUN_ID"]
          url = f'{os.environ["GITHUB_SERVER_URL"]}/{os.environ["GITHUB_REPOSITORY"]}/actions/runs/{run_id}'
          project = os.environ["PROJECT_NAME"]
          print(json.dumps({
              "status": "succeeded",
              "external_run_id": run_id,
              "external_run_url": url,
              "railway_project_id": project,
              "railway_environment_id": "production",
              "service_urls": {
                  "api": os.environ["API_URL"],
                  "admin_ui": os.environ["ADMIN_UI_URL"],
                  "railway_project": f"railway://{project}",
              },
              "migration_revision": os.environ["IN_INITIAL_VERSION"],
              "smoke_status": "core_smoke_passed",
              "result_payload": {
                  "module_ids": json.loads(os.environ["IN_MODULE_IDS_JSON"]),
                  "deployment_type": os.environ["IN_DEPLOYMENT_TYPE"],
                  "service_ids": json.loads(os.environ["SERVICE_IDS_JSON"]),
                  "module_services_deployed": json.loads(os.environ["MODULE_DEPLOYED_JSON"]),
                  "module_services_pending_code": json.loads(os.environ["MODULE_PENDING_JSON"]),
              },
              "bootstrap_password": os.environ["BOOTSTRAP_PASSWORD"],
          }))
          PY
          )
          curl --fail-with-body -sS -X POST "${IN_CALLBACK_URL}" \
            -H "Authorization: Bearer ${CALLBACK_KEY}" \
            -H "X-OneBrain-Callback-Key-Id: ${IN_CALLBACK_KEY_ID}" \
            -H "Content-Type: application/json" \
            --data "${payload}"

      - name: Report failure
        if: ${{ failure() }}
        shell: bash
        env:
          CALLBACK_KEY: ${{ secrets.ONEBRAIN_PROVISIONING_CALLBACK_KEY }}
        run: |
          set +e
          export REASON="provisioning workflow failed; inspect sanitized GitHub Actions logs"
          payload=$(python - <<'PY'
          import json, os
          run_id = os.environ["GITHUB_RUN_ID"]
          url = f'{os.environ["GITHUB_SERVER_URL"]}/{os.environ["GITHUB_REPOSITORY"]}/actions/runs/{run_id}'
          print(json.dumps({
              "status": "failed",
              "external_run_id": run_id,
              "external_run_url": url,
              "failure_reason": os.environ["REASON"],
              "result_payload": {"dry_run": os.environ["IN_DRY_RUN"]},
          }))
          PY
          )
          curl -sS -X POST "${IN_CALLBACK_URL}" \
            -H "Authorization: Bearer ${CALLBACK_KEY}" \
            -H "X-OneBrain-Callback-Key-Id: ${IN_CALLBACK_KEY_ID}" \
            -H "Content-Type: application/json" \
            --data "${payload}" || true
