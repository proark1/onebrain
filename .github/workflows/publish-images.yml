# Digest retrieval contract: authoritative image digests are resolved from the
# immutable tag via `docker buildx imagetools inspect ghcr.io/proark1/<image>:sha-<full-git-sha>`.
# The job/workflow outputs below are only available within the same run (or to a
# same-run caller via workflow_call) — they are NOT retrievable cross-run.

name: Publish images

on:
  workflow_call:
    outputs:
      api-digest:
        description: Digest of the pushed ghcr.io/proark1/onebrain-api image
        value: ${{ jobs.api.outputs.digest }}
      workers-digest:
        description: Digest of the pushed ghcr.io/proark1/onebrain-workers image
        value: ${{ jobs.workers.outputs.digest }}
      admin-ui-digest:
        description: Digest of the pushed ghcr.io/proark1/onebrain-admin-ui image
        value: ${{ jobs.admin-ui.outputs.digest }}

concurrency:
  group: publish-images-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: read
  packages: write

jobs:
  api:
    name: Publish onebrain-api
    runs-on: ubuntu-latest

    outputs:
      digest: ${{ steps.push.outputs.digest }}

    steps:
      - name: Check out repository
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5.0.1

      # The default Docker driver cannot attach provenance/SBOM attestations.
      # Use the isolated Buildx container driver before the hardened push step.
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@8d2750c68a42422c14e847fe6c8ac0403b4cbd6f # v3.12.0

      - name: Log in to GHCR
        uses: docker/login-action@af1e73f918a031802d376d3c8bbc3fe56130a9b0 # v4.4.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push image
        id: push
        uses: docker/build-push-action@10e90e3645eae34f1e60eeb005ba3a3d33f178e8 # v6.19.2
        with:
          context: .
          file: Dockerfile
          push: true
          provenance: mode=max
          sbom: true
          tags: |
            ghcr.io/proark1/onebrain-api:sha-${{ github.sha }}
            ${{ github.ref_name == github.event.repository.default_branch && 'ghcr.io/proark1/onebrain-api:latest' || '' }}
          labels: |
            org.opencontainers.image.title=onebrain-api
            org.opencontainers.image.version=sha-${{ github.sha }}
            org.opencontainers.image.revision=${{ github.sha }}
            org.opencontainers.image.source=${{ github.server_url }}/${{ github.repository }}

      - name: Report digest
        run: |
          {
            echo "### onebrain-api"
            echo ""
            echo "- image: \`ghcr.io/proark1/onebrain-api\`"
            echo "- digest: \`${{ steps.push.outputs.digest }}\`"
          } >> "$GITHUB_STEP_SUMMARY"

  workers:
    name: Publish onebrain-workers
    runs-on: ubuntu-latest

    outputs:
      digest: ${{ steps.push.outputs.digest }}

    steps:
      - name: Check out repository
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5.0.1

      # The default Docker driver cannot attach provenance/SBOM attestations.
      # Use the isolated Buildx container driver before the hardened push step.
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@8d2750c68a42422c14e847fe6c8ac0403b4cbd6f # v3.12.0

      - name: Log in to GHCR
        uses: docker/login-action@af1e73f918a031802d376d3c8bbc3fe56130a9b0 # v4.4.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push image
        id: push
        uses: docker/build-push-action@10e90e3645eae34f1e60eeb005ba3a3d33f178e8 # v6.19.2
        with:
          context: .
          file: Dockerfile.worker
          push: true
          provenance: mode=max
          sbom: true
          tags: |
            ghcr.io/proark1/onebrain-workers:sha-${{ github.sha }}
            ${{ github.ref_name == github.event.repository.default_branch && 'ghcr.io/proark1/onebrain-workers:latest' || '' }}
          labels: |
            org.opencontainers.image.title=onebrain-workers
            org.opencontainers.image.version=sha-${{ github.sha }}
            org.opencontainers.image.revision=${{ github.sha }}
            org.opencontainers.image.source=${{ github.server_url }}/${{ github.repository }}

      - name: Report digest
        run: |
          {
            echo "### onebrain-workers"
            echo ""
            echo "- image: \`ghcr.io/proark1/onebrain-workers\`"
            echo "- digest: \`${{ steps.push.outputs.digest }}\`"
          } >> "$GITHUB_STEP_SUMMARY"

  admin-ui:
    name: Publish onebrain-admin-ui
    runs-on: ubuntu-latest

    outputs:
      digest: ${{ steps.push.outputs.digest }}

    steps:
      - name: Check out repository
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5.0.1

      # The default Docker driver cannot attach provenance/SBOM attestations.
      # Use the isolated Buildx container driver before the hardened push step.
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@8d2750c68a42422c14e847fe6c8ac0403b4cbd6f # v3.12.0

      - name: Log in to GHCR
        uses: docker/login-action@af1e73f918a031802d376d3c8bbc3fe56130a9b0 # v4.4.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push image
        id: push
        uses: docker/build-push-action@10e90e3645eae34f1e60eeb005ba3a3d33f178e8 # v6.19.2
        with:
          context: onebrain-web
          file: onebrain-web/Dockerfile
          push: true
          provenance: mode=max
          sbom: true
          tags: |
            ghcr.io/proark1/onebrain-admin-ui:sha-${{ github.sha }}
            ${{ github.ref_name == github.event.repository.default_branch && 'ghcr.io/proark1/onebrain-admin-ui:latest' || '' }}
          labels: |
            org.opencontainers.image.title=onebrain-admin-ui
            org.opencontainers.image.version=sha-${{ github.sha }}
            org.opencontainers.image.revision=${{ github.sha }}
            org.opencontainers.image.source=${{ github.server_url }}/${{ github.repository }}

      - name: Report digest
        run: |
          {
            echo "### onebrain-admin-ui"
            echo ""
            echo "- image: \`ghcr.io/proark1/onebrain-admin-ui\`"
            echo "- digest: \`${{ steps.push.outputs.digest }}\`"
          } >> "$GITHUB_STEP_SUMMARY"

  # P4-09: classify the NEW migration files in this publish delta as code_only vs
  # restore_required (architecture §3a) and surface the result. Advisory + never
  # blocks the image publish (continue-on-error): the AUTHORITATIVE gate is
  # POST /api/operator/releases, which rejects a declared rollback_kind looser than
  # this classification (see app/routers/operator.create_release, unit-tested).
  # shellcheck is CI-only (A4) — not a local merge gate.
  classify-migrations:
    name: Classify new migrations
    runs-on: ubuntu-latest
    continue-on-error: true

    steps:
      - name: Check out repository
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5.0.1
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5.6.0
        with:
          python-version: "3.12"

      - name: Install locked classifier dependencies
        run: python -m pip install --require-hashes -r requirements.txt

      - name: Classify the migration delta
        run: |
          set -euo pipefail
          base="${{ github.event.before }}"
          if [ -z "$base" ] || ! git cat-file -e "${base}^{commit}" 2>/dev/null; then
            base="$(git rev-parse HEAD~1 2>/dev/null || true)"
          fi
          if [ -z "$base" ]; then
            echo "No base commit to diff against; skipping." >> "$GITHUB_STEP_SUMMARY"
            exit 0
          fi
          new_files="$(git diff --name-only --diff-filter=A "$base" HEAD -- 'migrations/versions/*.py' || true)"
          if [ -z "$new_files" ]; then
            echo "No new alembic migrations in this delta." >> "$GITHUB_STEP_SUMMARY"
            exit 0
          fi
          args=""
          while IFS= read -r f; do
            [ -n "$f" ] && args="$args --alembic-file $f"
          done <<< "$new_files"
          set +e
          # shellcheck disable=SC2086
          python scripts/sign_release.py classify $args
          code=$?
          set -e
          case "$code" in
            0) kind="code_only" ;;
            3) kind="restore_required" ;;
            *) echo "classifier error (exit $code)" >> "$GITHUB_STEP_SUMMARY"; exit "$code" ;;
          esac
          {
            echo "### Migration classification"
            echo ""
            echo "- new files:"
            echo "$new_files" | sed 's/^/  - /'
            echo "- rollback_kind: \`$kind\`"
            echo ""
            echo "Enforcement: POST /api/operator/releases rejects a declared rollback_kind looser than this."
          } >> "$GITHUB_STEP_SUMMARY"
