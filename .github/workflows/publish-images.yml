# Digest retrieval contract: authoritative image digests are resolved from the
# immutable tag via `docker buildx imagetools inspect ghcr.io/proark1/<image>:sha-<full-git-sha>`.
# The job/workflow outputs below are only available within the same run (or to a
# same-run caller via workflow_call) — they are NOT retrievable cross-run.

name: Publish images

on:
  workflow_dispatch:
  workflow_call:
    outputs:
      api-digest:
        description: Digest of the pushed ghcr.io/proark1/onebrain-api image
        value: ${{ jobs.api.outputs.digest }}
      workers-digest:
        description: Digest of the pushed ghcr.io/proark1/onebrain-workers image
        value: ${{ jobs.workers.outputs.digest }}
      admin-ui-digest:
        description: Digest of the pushed ghcr.io/proark1/onebrain-admin-ui image
        value: ${{ jobs.admin-ui.outputs.digest }}

concurrency:
  group: publish-images-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: read
  packages: write

jobs:
  api:
    name: Publish onebrain-api
    runs-on: ubuntu-latest

    outputs:
      digest: ${{ steps.push.outputs.digest }}

    steps:
      - name: Check out repository
        uses: actions/checkout@v5

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Compute image metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/proark1/onebrain-api
          tags: |
            type=sha,format=long
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and push image
        id: push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}

      - name: Report digest
        run: |
          {
            echo "### onebrain-api"
            echo ""
            echo "- image: \`ghcr.io/proark1/onebrain-api\`"
            echo "- digest: \`${{ steps.push.outputs.digest }}\`"
          } >> "$GITHUB_STEP_SUMMARY"

  workers:
    name: Publish onebrain-workers
    runs-on: ubuntu-latest

    outputs:
      digest: ${{ steps.push.outputs.digest }}

    steps:
      - name: Check out repository
        uses: actions/checkout@v5

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Compute image metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/proark1/onebrain-workers
          tags: |
            type=sha,format=long
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and push image
        id: push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile.worker
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}

      - name: Report digest
        run: |
          {
            echo "### onebrain-workers"
            echo ""
            echo "- image: \`ghcr.io/proark1/onebrain-workers\`"
            echo "- digest: \`${{ steps.push.outputs.digest }}\`"
          } >> "$GITHUB_STEP_SUMMARY"

  admin-ui:
    name: Publish onebrain-admin-ui
    runs-on: ubuntu-latest

    outputs:
      digest: ${{ steps.push.outputs.digest }}

    steps:
      - name: Check out repository
        uses: actions/checkout@v5

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Compute image metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/proark1/onebrain-admin-ui
          tags: |
            type=sha,format=long
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and push image
        id: push
        uses: docker/build-push-action@v6
        with:
          context: onebrain-web
          file: onebrain-web/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}

      - name: Report digest
        run: |
          {
            echo "### onebrain-admin-ui"
            echo ""
            echo "- image: \`ghcr.io/proark1/onebrain-admin-ui\`"
            echo "- digest: \`${{ steps.push.outputs.digest }}\`"
          } >> "$GITHUB_STEP_SUMMARY"
