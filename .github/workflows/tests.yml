name: Tests

on:
  push:
  pull_request:

jobs:
  python:
    name: Python tests
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v5

      - name: Install system OCR dependency
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends tesseract-ocr

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: |
            requirements.txt
            requirements-dev.txt

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements-dev.txt

      - name: Run tests
        env:
          ONEBRAIN_AUTH_SECRET: ci-test-secret-ci-test-secret-ci-test-secret
          ONEBRAIN_COOKIE_SECURE: "false"
        run: python -m pytest -q

  frontend:
    name: Frontend checks
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: onebrain-web

    steps:
      - name: Check out repository
        uses: actions/checkout@v5

      - name: Set up Node
        uses: actions/setup-node@v6
        with:
          node-version: "24"
          cache: npm
          cache-dependency-path: onebrain-web/package-lock.json

      - name: Install frontend dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Typecheck
        run: npm run typecheck

      - name: Unit tests
        run: npm test

      - name: Build
        run: npm run build

  workflow-and-secrets:
    name: Workflow and secret checks
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v5

      - name: Validate provisioning workflow contract
        run: |
          python - <<'PY'
          from pathlib import Path
          text = Path(".github/workflows/provision-customer.yml").read_text()
          required = [
              "workflow_dispatch",
              "run_id",
              "module_ids_json",
              "callback_url",
              "dry_run",
              "ONEBRAIN_PROVISIONING_CALLBACK_KEY",
              "RAILWAY_TOKEN",
              "Send running callback",
              "Dry-run provisioning",
              "Provision Railway stack",
              "add --database postgres",
              "onebrain-api",
              "onebrain-workers",
              "onebrain-admin-ui",
              "module_services_pending_code",
              "core_smoke_passed",
          ]
          missing = [item for item in required if item not in text]
          if missing:
              raise SystemExit(f"workflow missing expected contract markers: {missing}")
          PY

      - name: Secret pattern scan
        shell: bash
        run: |
          set -euo pipefail
          python - <<'PY'
          import re
          from pathlib import Path

          patterns = [
              re.compile(r"sk-[A-Za-z0-9]{20,}"),
              re.compile(r"ghp_[A-Za-z0-9]{20,}"),
              re.compile(r"(?i)(api[_-]?key|secret|token|password)\s*=\s*['\"][^'\"]{12,}['\"]"),
          ]
          ignored_dirs = {".git", ".next", "node_modules", ".pytest_cache", "__pycache__", ".onebrain_data"}
          ignored_parts = {"tests", "scripts"}
          allowed_files = {
              ".github/workflows/provision-customer.yml",
              ".github/workflows/update-customer.yml",
              "app/users/seed.py",
          }
          findings = []
          for path in Path(".").rglob("*"):
              if not path.is_file() or any(part in ignored_dirs for part in path.parts):
                  continue
              if any(part in ignored_parts for part in path.parts) or path.as_posix() in allowed_files:
                  continue
              if path.suffix.lower() in {".png", ".jpg", ".jpeg", ".gif", ".pdf", ".pyc"}:
                  continue
              try:
                  text = path.read_text(encoding="utf-8")
              except UnicodeDecodeError:
                  continue
              for pattern in patterns:
                  if pattern.search(text):
                      findings.append(str(path))
                      break
          if findings:
              raise SystemExit("possible committed secret patterns in: " + ", ".join(sorted(findings)))
          PY

  publish-images:
    name: Publish images
    needs: [python, frontend, workflow-and-secrets]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    permissions:
      contents: read
      packages: write
    uses: ./.github/workflows/publish-images.yml

  register-release-candidate:
    name: Register development candidate
    needs: [publish-images]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main' && vars.ONEBRAIN_RELEASE_CANDIDATE_ENABLED == 'true'
    runs-on: ubuntu-latest
    environment: release-dev
    permissions:
      contents: read

    steps:
      - name: Check out repository
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install signing dependency
        run: python -m pip install cryptography

      - name: Register exact published digests
        env:
          ONEBRAIN_MC_URL: ${{ secrets.ONEBRAIN_MC_URL }}
          ONEBRAIN_RELEASE_CANDIDATE_KEY_ID: ${{ secrets.ONEBRAIN_RELEASE_CANDIDATE_KEY_ID }}
          ONEBRAIN_RELEASE_CANDIDATE_SECRET: ${{ secrets.ONEBRAIN_RELEASE_CANDIDATE_SECRET }}
          ONEBRAIN_DEV_RELEASE_PRIVATE_KEY: ${{ secrets.ONEBRAIN_DEV_RELEASE_PRIVATE_KEY }}
          ONEBRAIN_DEV_RELEASE_KEY_ID: ${{ vars.ONEBRAIN_DEV_RELEASE_KEY_ID }}
          ONEBRAIN_CANDIDATE_DATE: ${{ github.event.head_commit.timestamp }}
          GITHUB_EVENT_BEFORE: ${{ github.event.before }}
          ONEBRAIN_ONEBRAIN_API_DIGEST: ${{ needs.publish-images.outputs.api-digest }}
          ONEBRAIN_ONEBRAIN_WORKERS_DIGEST: ${{ needs.publish-images.outputs.workers-digest }}
          ONEBRAIN_ONEBRAIN_ADMIN_UI_DIGEST: ${{ needs.publish-images.outputs.admin-ui-digest }}
        run: python -m scripts.register_release_candidate
